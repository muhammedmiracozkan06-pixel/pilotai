<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilotAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <header>
            <div class="logo">Pilot AI</div>
            <select id="model-select">
                <option value="openai/gpt-oss-safeguard-20b">GPT 20B </option>
                <option value="qwen/qwen3-32b">Qwen3 </option>
                <option value="groq/compound">groq compound </option>
            </select>
            <div class="status-dot"></div>
        </header>

        <div id="chat-window">
            <div class="ai-msg">How are you today?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask pilot...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
