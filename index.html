<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PilotAI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div id="login-overlay">
        <h2>Pilot AI'ya Hoş Geldin! 👨‍✈️</h2>
        <div id="g_id_onload"
             data-client_id="64726463498-valtvmnoh0l88qsud6188dmpn54j5sqf.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="app-container">
        <header>
            <div class="logo">Pilot AI</div>
            <select id="model-select">
                <option value="openai/gpt-oss-safeguard-20b">GPT 20B </option>
                <option value="qwen/qwen3-32b">Qwen3 </option>
                <option value="groq/compound">groq compound </option>
            </select>
            <div id="user-info" style="display: none; align-items: center; gap: 10px;">
                <span id="user-name" style="color: white; font-size: 12px;"></span>
                <img id="user-pic" src="" style="width: 30px; height: 30px; border-radius: 50%; border: 1px solid #22c55e;">
            </div>
            <div class="status-dot"></div>
        </header>

        <div id="chat-window">
            <div class="ai-msg">Selam Mirac! Oturum açıldı, uçuşa hazırız. ✨</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask pilot...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
