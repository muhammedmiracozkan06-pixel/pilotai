<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot AI - Wind Developers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">Pilot AI</div>
            <div id="user-info">
                <span id="user-name">Guest</span>
                <img id="user-pic" src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile">
            </div>
            <select id="model-select">
                <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                <option value="gemma2-9b-it">Gemma 2 9B</option>
            </select>
        </header>

        <div id="chat-window">
            <div class="ai-msg">Hello! Pilot AI is ready. How can I help you today? ✨</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
