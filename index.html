<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot AI - Wind Developers</title>
    
    <link rel="icon" type="image/png" href="1773592950641.png">
    <link rel="apple-touch-icon" href="1773592950641.png"> 
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">Pilot AI</div>
            <div id="user-info">
                <span id="user-name">Guest</span>
                <img id="user-pic" src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile">
            </div>
            <select id="model-select">
                <option value="openai/gpt-oss-120b">pilot v5</option>
                <option value="groq/compound">Groq Compound</option>
                <option value="qwen/qwen3-32b">Qwen</option>
                <option value="moonshotai/kimi-k2-instruct-0905">Kimi k2</option>
                
                <option value="openai/gpt-oss-120b">pilot 6 pro</option>
                <option value="meta-llama/llama-4-scout-17b-16e-instruct">Pilot Lite</option>
                <option value="llama-3.3-70b-versatile">LLMA 3</option>
                <option value="openai/gpt-oss-safeguard-20b">Pilot security</option>
            </select>
        </header>

        <div id="chat-window">
            <div class="ai-msg">Hello! Pilot AI is ready. How can I help you today? ✨</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
